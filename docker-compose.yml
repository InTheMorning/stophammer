name: stophammer

services:
  primary:
    build:
      context: .
    restart: unless-stopped
    env_file:
      - ./packaging/env/compose-primary.env
    volumes:
      - primary-data:/data
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8008/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  resolverd:
    build:
      context: .
    command: ["stophammer-resolverd"]
    restart: unless-stopped
    env_file:
      - ./packaging/env/compose-resolverd.env
    volumes:
      - primary-data:/data
    depends_on:
      primary:
        condition: service_healthy

  gossip:
    build:
      context: .
      dockerfile: stophammer-crawler/Dockerfile
    user: "${GOSSIP_UID:-1000}:${GOSSIP_GID:-1000}"
    restart: unless-stopped
    env_file:
      - ./packaging/env/compose-crawler-gossip.env
    volumes:
      - crawler-data:/data
      - ${GOSSIP_ARCHIVE_HOST_DIR:-/var/lib/podping-alpha-gossip-listener}:/podping:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      primary:
        condition: service_healthy

volumes:
  primary-data:
  crawler-data:
