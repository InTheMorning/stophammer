name: stophammer

services:
  podping-init:
    image: alpine:3.20
    user: "0:0"
    command: ["sh", "-lc", "mkdir -p /data && chown -R 1000:1000 /data"]
    restart: "no"
    volumes:
      - podping-data:/data

  primary:
    image: ${STOPHAMMER_INDEXER_IMAGE:-stophammer-indexer}
    build:
      context: .
      target: stophammer-indexer
    restart: unless-stopped
    env_file:
      - ./packaging/env/primary.compose.env
    volumes:
      - primary-data:/data
    ports:
      - "8008:8008"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://127.0.0.1:8008/health"]
      interval: 10s
      timeout: 3s
      retries: 12
      start_period: 10s

  podping:
    image: ${STOPHAMMER_PODPING_IMAGE:-ghcr.io/suorcd/gossip-listener:latest}
    restart: unless-stopped
    env_file:
      - ./packaging/env/podping.compose.env
    volumes:
      - podping-data:/data
    depends_on:
      podping-init:
        condition: service_completed_successfully

  crawler-init:
    image: ${STOPHAMMER_GOSSIP_IMAGE:-stophammer-gossip}
    user: "0:0"
    command: ["sh", "-lc", "mkdir -p /data && chown -R stophammer-crawler:stophammer-crawler /data"]
    restart: "no"
    volumes:
      - crawler-data:/data

  gossip:
    image: ${STOPHAMMER_GOSSIP_IMAGE:-stophammer-gossip}
    command:
      - /bin/sh
      - -lc
      - >
        set -- stophammer-crawler gossip
        --state "$${GOSSIP_STATE_DB:-/data/gossip_state.db}"
        --skip-db "$${FEED_SKIP_DB:-/data/feed_skip.db}";
        if [ -n "$${GOSSIP_SSE_URL:-}" ]; then set -- "$$@" --sse-url "$$GOSSIP_SSE_URL"; fi;
        if [ -n "$${GOSSIP_ARCHIVE_DB:-}" ]; then set -- "$$@" --archive-db "$$GOSSIP_ARCHIVE_DB"; fi;
        if [ -n "$${GOSSIP_SINCE_HOURS:-}" ]; then set -- "$$@" --since-hours "$$GOSSIP_SINCE_HOURS"; fi;
        if [ -n "$${GOSSIP_SKIP_TTL_DAYS:-}" ]; then set -- "$$@" --skip-ttl-days "$$GOSSIP_SKIP_TTL_DAYS"; fi;
        if [ -n "$${CONCURRENCY:-}" ]; then set -- "$$@" --concurrency "$$CONCURRENCY"; fi;
        if [ "$${GOSSIP_SKIP_KNOWN_NON_MUSIC:-1}" = "1" ]; then set -- "$$@" --skip-known-non-music; fi;
        if [ "$${GOSSIP_QUIET:-0}" = "1" ]; then set -- "$$@" --quiet; fi;
        exec "$@"
    restart: unless-stopped
    env_file:
      - ./packaging/env/crawler-gossip.compose.env
    volumes:
      - crawler-data:/data
      - podping-data:/podping:ro
    depends_on:
      crawler-init:
        condition: service_completed_successfully
      primary:
        condition: service_healthy
      podping:
        condition: service_started

  import:
    profiles: ["tools"]
    image: ${STOPHAMMER_IMPORT_IMAGE:-stophammer-gossip}
    command:
      - /bin/sh
      - -lc
      - >
        set -- stophammer-crawler import
        --db "$${PODCASTINDEX_DB:-/data/podcastindex_feeds.db}"
        --state "$${IMPORT_STATE_DB:-/data/import_state.db}"
        --skip-db "$${FEED_SKIP_DB:-/data/feed_skip.db}";
        if [ -n "$${PODCASTINDEX_DB_URL:-}" ]; then set -- "$$@" --db-url "$$PODCASTINDEX_DB_URL"; fi;
        if [ "$${IMPORT_REFRESH_DB:-0}" = "1" ]; then set -- "$$@" --refresh-db; fi;
        if [ -n "$${CONCURRENCY:-}" ]; then set -- "$$@" --concurrency "$$CONCURRENCY"; fi;
        if [ -n "$${IMPORT_BATCH:-}" ]; then set -- "$$@" --batch "$$IMPORT_BATCH"; fi;
        if [ -n "$${IMPORT_CURSOR:-}" ]; then set -- "$$@" --cursor "$$IMPORT_CURSOR"; fi;
        if [ -n "$${IMPORT_AUDIT_OUTPUT:-}" ]; then set -- "$$@" --audit-output "$$IMPORT_AUDIT_OUTPUT"; fi;
        if [ "$${IMPORT_AUDIT_REPLACE:-0}" = "1" ]; then set -- "$$@" --audit-replace; fi;
        if [ "$${IMPORT_SKIP_KNOWN_NON_MUSIC:-0}" = "1" ]; then set -- "$$@" --skip-known-non-music; fi;
        if [ "$${IMPORT_SKIP_KNOWN_SUCCESS:-0}" = "1" ]; then set -- "$$@" --skip-known-success; fi;
        if [ "$${IMPORT_WAVLAKE_ONLY:-0}" = "1" ]; then set -- "$$@" --wavlake-only; fi;
        if [ "$${IMPORT_DRY_RUN:-0}" = "1" ]; then set -- "$$@" --dry-run; fi;
        exec "$@"
    restart: "no"
    env_file:
      - ./packaging/env/crawler-import.compose.env
    volumes:
      - crawler-data:/data
    depends_on:
      crawler-init:
        condition: service_completed_successfully
      primary:
        condition: service_healthy

volumes:
  primary-data:
  crawler-data:
  podping-data:
