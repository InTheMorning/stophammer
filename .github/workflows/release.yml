name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always
  RUST_TOOLCHAIN: 1.93.1

jobs:
  assemble-tarballs:
    name: Assemble role tarballs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - uses: Swatinem/rust-cache@v2

      - name: Assemble role tarballs
        run: bash ./scripts/publish-release.sh "${GITHUB_REF_NAME}"

      - name: Upload release bundle
        uses: actions/upload-artifact@v4
        with:
          name: stophammer-release-bundle
          path: |
            dist/*.tar.gz
            dist/SHA256SUMS-*.txt

  verify-tarballs:
    name: Verify release tarballs
    runs-on: ubuntu-latest
    needs: assemble-tarballs
    steps:
      - uses: actions/checkout@v5

      - name: Download release bundle
        uses: actions/download-artifact@v4
        with:
          name: stophammer-release-bundle
          path: dist

      - name: Smoke-check tarballs
        run: bash ./scripts/verify-release.sh "${GITHUB_REF_NAME}"

  release-tarballs:
    name: Publish role tarballs
    runs-on: ubuntu-latest
    needs: verify-tarballs
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: stophammer-release-bundle
          path: dist

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/*.tar.gz
            dist/SHA256SUMS-*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-arch-packages:
    name: Build Arch packages
    runs-on: ubuntu-latest
    needs: verify-tarballs
    container:
      image: archlinux:latest
    steps:
      - name: Install Arch build dependencies
        run: pacman -Syu --noconfirm base-devel cargo git

      - uses: actions/checkout@v5

      - name: Create build user
        run: |
          useradd -m builder
          chown -R builder:builder "$GITHUB_WORKSPACE"

      - name: Build Arch packages
        run: su builder -c "cd \"$GITHUB_WORKSPACE\" && bash ./scripts/build-arch-packages.sh \"${GITHUB_REF_NAME}\""

      - name: Upload Arch package bundle
        uses: actions/upload-artifact@v4
        with:
          name: stophammer-arch-package-bundle
          path: |
            dist/arch/*.pkg.tar.zst
            dist/arch/SHA256SUMS-arch-*.txt

  verify-arch-packages:
    name: Verify Arch packages
    runs-on: ubuntu-latest
    needs: build-arch-packages
    steps:
      - uses: actions/checkout@v5

      - name: Download Arch package bundle
        uses: actions/download-artifact@v4
        with:
          name: stophammer-arch-package-bundle
          path: dist/arch

      - name: Smoke-check Arch packages
        run: bash ./scripts/verify-arch-packages.sh "${GITHUB_REF_NAME}"

  release-arch-packages:
    name: Publish Arch packages
    runs-on: ubuntu-latest
    needs:
      - verify-arch-packages
      - release-tarballs
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: stophammer-arch-package-bundle
          path: dist/arch

      - name: Attach Arch packages to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/arch/*.pkg.tar.zst
            dist/arch/SHA256SUMS-arch-*.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-oci-images:
    name: Publish OCI images
    runs-on: ubuntu-latest
    needs: verify-tarballs
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - image_name: stophammer-indexer
            dockerfile: ./Dockerfile
            target: stophammer-indexer
          - image_name: stophammer-node
            dockerfile: ./Dockerfile
            target: stophammer-node
          - image_name: stophammer-crawler
            context: ./stophammer-crawler
            dockerfile: ./stophammer-crawler/Dockerfile
            target: stophammer-crawler
    steps:
      - uses: actions/checkout@v5

      - uses: docker/setup-qemu-action@v3

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ matrix.image_name }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}

      - name: Build and push ${{ matrix.image_name }}
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context || '.' }}
          file: ${{ matrix.dockerfile }}
          target: ${{ matrix.target }}
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: false
          sbom: false
          labels: ${{ steps.meta.outputs.labels }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha,scope=${{ matrix.image_name }}
          cache-to: type=gha,mode=max,scope=${{ matrix.image_name }}
